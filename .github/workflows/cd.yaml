name: CD
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: docker build -f Dockerfile.serve -t myapp:latest .
      # Ajoutez ici la logique de push vers registry et le déploiement (k8s, cloud, etc.)
